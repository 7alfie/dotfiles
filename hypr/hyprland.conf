# ╔═══════════════════════════════════════════════════════════╗
# ║                 HYPRLAND CONFIG                           ║
# ║          Dynamic theming via Matugen                      ║
# ╚═══════════════════════════════════════════════════════════╝

# Source matugen-generated colours (regenerated on wallpaper change)
source = ~/.config/hypr/colors.conf

# ─── Monitor ────────────────────────────────────────────────
monitor=,preferred,auto,1

# ─── Autostart ──────────────────────────────────────────────
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = awww-daemon
exec-once = waybar
exec-once = mako
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = sleep 1 && ~/.config/scripts/wallpaper.sh
# --- Environment ---
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ─── Input ──────────────────────────────────────────────────
input {
    kb_layout  = gb                 # United Kingdom layout
    kb_options = caps:escape        # Caps Lock → Escape (essential for Neovim)

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll   = yes
        tap-to-click     = yes
        drag_lock        = true
        disable_while_typing = true
    }
}

# ─── General ────────────────────────────────────────────────
general {
    gaps_in  = 4
    gaps_out = 10
    border_size = 2

    # Colors sourced from ~/.config/hypr/colors.conf (matugen-generated)
    col.active_border   = $primary $tertiary 45deg
    col.inactive_border = $surface_variant

    layout = dwindle
    allow_tearing = false
}

# ─── Decoration ─────────────────────────────────────────────
decoration {
    rounding = 12

    active_opacity   = 1.0
    inactive_opacity = 0.94

    blur {
        enabled          = true
        size             = 8
        passes           = 2
        new_optimizations = true
        xray             = false
        ignore_opacity   = true
    }

    shadow {
        enabled      = true
        range        = 14
        render_power = 3
        color        = $shadow_color
    }
}

# ─── Animations ─────────────────────────────────────────────
animations {
    enabled = yes

    bezier = overshot,  0.05, 0.9, 0.1, 1.05
    bezier = smoothIn,  0.25, 1.0, 0.5, 1.0
    bezier = smoothOut, 0.36, 0.0, 0.66, -0.56
    bezier = linear,    0.0,  0.0, 1.0, 1.0

    animation = windows,     1, 5, overshot, slide
    animation = windowsOut,  1, 4, smoothOut, popin 80%
    animation = windowsMove, 1, 4, smoothIn
    animation = border,      1, 10, linear
    animation = borderangle, 1, 80, linear, loop
    animation = fade,        1, 6, smoothIn
    animation = workspaces,  1, 5, overshot, slidevert
}

# ─── Layout ─────────────────────────────────────────────────
dwindle {
    pseudotile    = yes
    preserve_split = yes
    smart_resizing = true
}

master {
    new_status = slave
}

# ─── Misc ───────────────────────────────────────────────────
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    vfr = true
}

# ─── Window Rules ───────────────────────────────────────────
#windowrule = float, class:^(pavucontrol)$
#windowrule = size 800 500, class:^(pavucontrol)$
#windowrule = center, class:^(pavucontrol)$
#windowrule = float, class:^(nm-connection-editor)$
#windowrule = float, class:^(thunar)$, title:^(File Operation Progress)$
#windowrule = opacity 0.9 0.85, class:^(kitty)$
#windowrule = pin,   class:^(firefox)$, title:^(Picture-in-Picture)$
#windowrule = float, class:^(firefox)$, title:^(Picture-in-Picture)$

# ─── Keybinds ───────────────────────────────────────────────
$mainMod   = SUPER
$term      = kitty
$editor    = kitty --title "Neovim" -e nvim
$browser   = firefox
$files     = thunar
$launcher  = wofi --show drun --prompt "Search..." --no-actions --hide-scroll
$wallpaper = ~/.config/scripts/wallpaper.sh

# ── Applications ────────────────────────────────────────────
bind = $mainMod,       Return, exec, $term
bind = $mainMod,       N,      exec, $editor
bind = $mainMod,       W,      exec, $browser
bind = $mainMod,       E,      exec, $files
bind = $mainMod,       Space,  exec, pkill wofi || wofi --show drun --prompt "Search..."

# ── Screenshots ─────────────────────────────────────────────
bind = $mainMod SHIFT, S,      exec, grimblast copy area
bind = $mainMod, C, exec, cliphist list | wofi --dmenu --prompt "Clipboard..." | cliphist decode | wl-copy' >> ~/.config/hypr/hyprland.conf
# ── Window Control ──────────────────────────────────────────
bind = $mainMod,       Q,      killactive
bind = $mainMod,       V,      togglefloating
bind = $mainMod,       F,      fullscreen, 0
bind = $mainMod,       P,      pseudo
bind = $mainMod SHIFT, E,      exit

# ── Wallpaper (random + retheme) ────────────────────────────
bind = $mainMod SHIFT, W,      exec, $wallpaper

# ── Focus (arrows + vim keys) ───────────────────────────────
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# ── Move Windows ────────────────────────────────────────────
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, L,     movewindow, r
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, J,     movewindow, d

# ── Resize Windows ──────────────────────────────────────────
binde = $mainMod CTRL, left,  resizeactive, -30 0
binde = $mainMod CTRL, right, resizeactive,  30 0
binde = $mainMod CTRL, up,    resizeactive,  0 -30
binde = $mainMod CTRL, down,  resizeactive,  0  30

# ── Workspaces ──────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Scroll workspaces on bar
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Special (scratchpad) workspace
bind = $mainMod, Tab,         togglespecialworkspace, scratch
bind = $mainMod SHIFT, Tab,   movetoworkspace, special:scratch

# ── Mouse ───────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ─── Media & System Keys ────────────────────────────────────────
# Volume
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
binde = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media keys
bind = , XF86AudioPlay,  exec, playerctl play-pause
bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl previous
bind = , XF86AudioStop,  exec, playerctl stop
